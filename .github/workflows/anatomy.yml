name: Workflow Anatomy

on:
  push:
    branches: [ master ]

jobs:
  anatomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Generated: $VERSION+$SHORT_SHA"

      - name: Use version in a tag
        run: |
          echo "Building tag: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}"

      - name: Use version in a filename
        run: |
          FILENAME="release-${{ steps.version.outputs.version }}.txt"
          echo "Writing $FILENAME"
          echo "Build ${{ steps.version.outputs.version }}+${{ steps.version.outputs.short_sha }}" > "$FILENAME"
          cat "$FILENAME"
