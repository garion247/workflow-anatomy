name: Workflow Anatomy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  anatomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "Running tests..."
          npm test

      - name: Push-only step
        if: github.event_name == 'push'
        run: echo "This step only runs on push events"

      - name: PR-only step
        if: github.event_name == 'pull_request'
        run: echo "This step only runs on pull requests"

      - name: Failure reporter
        if: failure()
        run: echo "A previous step failed - would alert here"

      - name: Always-runs cleanup
        if: always()
        run: echo "This always runs, even after failures"
