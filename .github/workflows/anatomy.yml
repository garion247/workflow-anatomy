name: Workflow Anatomy

on:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  anatomy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: List issues using GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --repo ${{ github.repository }} --limit 5 --json number,title \
            | jq -r '.[] | "#\(.number) \(.title)"' \
            || echo "No issues yet"

      - name: Create a heartbeat issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Run #${{ github.run_number }} heartbeat" \
            --body "Created by workflow run ${{ github.run_id }}"
