name: Workflow Anatomy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  GREETING: "from workflow"
  AUDIENCE: "world"

jobs:
  anatomy:
    runs-on: ubuntu-latest
    env:
      GREETING: "from job"
    steps:
      - uses: actions/checkout@v4

      - name: Workflow env wins for AUDIENCE
        run: echo "AUDIENCE=$AUDIENCE"

      - name: Job env overrides workflow for GREETING
        run: echo "GREETING=$GREETING"

      - name: Step env wins
        env:
          GREETING: "from step"
        run: echo "GREETING=$GREETING"
